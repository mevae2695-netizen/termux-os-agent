name: Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Python version
        run: |
          which python3
          python3 --version

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Android SDK & Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-v4-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v4-

      - name: Install Buildozer and Dependencies
        run: |
          sudo apt update
          sudo apt install -y zip unzip git autoconf autotools-dev automake libtool libtool-bin libltdl-dev pkg-config zlib1g-dev libncurses-dev libssl-dev cmake libffi-dev
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install Cython==0.29.33 buildozer==1.5.0 python-for-android==2024.1.21 --break-system-packages

      - name: Override Pillow Version in P4A Recipe
        run: |
          # p4a'nın kendi içindeki Pillow recipe dosyasını bulup surumu 11.1.0'a zorluyoruz
          # (10.3.0, Python 3.14'un C API degisikliklerini desteklemiyor)
          P4A_DIR=$(python3 -c "import pythonforandroid; import os; print(os.path.dirname(pythonforandroid.__file__))")
          if [ -f "$P4A_DIR/recipes/pillow/__init__.py" ]; then
            sed -i 's/version = .*/version = "11.1.0"/g' "$P4A_DIR/recipes/pillow/__init__.py"
            echo "P4A Pillow recipe surumu basariyla 11.1.0 olarak degistirildi."
          fi

      - name: Build APK
        env:
          BUILDOZER_ACCEPT_ANDROID_SDK_LICENSE: "1"
          BUILDOZER_WARN_ON_ROOT: "0"
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Package
          path: bin/*.apk
