name: Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Buildozer and Dependencies
        run: |
          sudo apt update
          sudo apt install -y zip unzip git autoconf autotools-dev automake libtool libtool-bin libltdl-dev pkg-config zlib1g-dev libncurses-dev libssl-dev cmake libffi-dev
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install Cython==0.29.33 buildozer==1.5.0 python-for-android==2024.1.21 --break-system-packages

      - name: Purge Old Cache and Build APK
        env:
          BUILDOZER_ACCEPT_ANDROID_SDK_LICENSE: "1"
          BUILDOZER_WARN_ON_ROOT: "0"
          P4A_python3_version: "3.11.9"
          P4A_hostpython3_version: "3.11.9"
        run: |
          # KÖKTEN ÇÖZÜM: Önceki 11.3.0 ve 3.14 hatalarını barındıran tüm gizli global cache klasörlerini siliyoruz
          rm -rf ~/.buildozer/
          rm -rf .buildozer/
          
          # Şimdi temizlenmiş parametrelerle derlemeyi sıfırdan başlatıyoruz
          buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Package
          path: bin/*.apk
